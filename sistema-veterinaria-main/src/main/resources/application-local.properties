# ===========================
# BASE DE DATOS LOCAL (XAMPP)
# ===========================
spring.datasource.url=jdbc:mysql://localhost:3306/vet_experts_db?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=America/Lima&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ===========================
# JPA / Hibernate
# ===========================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# ====================================================
# CONFIGURACIÓN CORREO SMTP (VET EXPERTS)
# Coloque sus credenciales reales de Gmail (Contraseña de aplicación) para enviar correos reales.
# ====================================================
spring.mail.host=${mail.host}
spring.mail.port=${mail.port}
spring.mail.username=${mail.username}
spring.mail.password=${mail.password}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true

# ====================================================
# CONFIGURACIÓN GOOGLE OAUTH2 (VET EXPERTS)
# Cuando configure producción o local con OAuth2 real, reemplace:
# google.oauth2.client-id=SU_CLIENT_ID_REAL
# google.oauth2.client-secret=SU_CLIENT_SECRET_REAL
# ====================================================