# ===========================
# VET EXPERTS - BASE
# ===========================
spring.application.name=sistema-veterinaria

# Perfil activo (se sobrescribe con variable de entorno)
spring.profiles.active=${SPRING_PROFILES_ACTIVE:local}

# ===========================
# Thymeleaf
# ===========================
spring.thymeleaf.cache=false
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html

# ===========================
# Servidor
# ===========================
server.port=${PORT:8080}
server.error.whitelabel.enabled=false

# ====================================================
# CONFIGURACIÓN CORREO SMTP PERSONALIZADO
# ====================================================
mail.host=smtp.gmail.com
mail.port=587
mail.username=tu-correo-emisor-gmail@gmail.com
mail.password=tu-contrasenia-de-aplicacion-de-16-letras
mail.sender=tu-correo-emisor-gmail@gmail.com

# Modo desarrollo para bypass de envío de correos SMTP reales
app.email.dev-mode=true

