<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head th:replace="~{fragments/layout :: head(${vacuna.id == null ? 'Registrar Vacuna' : 'Editar Vacuna'})}">
</head>
<body>

    <!-- Navbar -->
    <nav th:replace="~{fragments/layout :: navbar}"></nav>

    <!-- Main Content -->
    <div class="main-content">
        <div class="container">

            <div class="form-card-wrapper">
                <div class="form-card">
                    
                    <div class="form-header">
                        <h4 th:text="${vacuna.id == null ? 'Registrar Aplicación de Vacuna' : 'Modificar Registro de Vacuna'}">Registrar Vacuna</h4>
                        <p>Complete la información detallada de la inmunización de la mascota.</p>
                    </div>

                    <form th:action="${vacuna.id == null} ? @{/vacunas/guardar} : @{/vacunas/actualizar/{id}(id=${vacuna.id})}"
                          th:object="${vacuna}" method="post" class="form-body">
                          
                        <!-- Errores de Negocio Generales -->
                        <div th:if="${errorNegocio}" class="alert alert-custom-danger mb-4 d-flex align-items-center" role="alert">
                            <i class="bi bi-exclamation-octagon-fill me-2 fs-5"></i>
                            <span th:text="${errorNegocio}">Error de negocio</span>
                        </div>

                        <input type="hidden" th:field="*{id}" />

                        <div class="row g-3">
                            <!-- Mascota -->
                            <div class="col-md-6">
                                <label for="mascotaId" class="form-label-custom">
                                    <i class="bi bi-heart-pulse-fill me-1"></i> Mascota
                                </label>
                                <select id="mascotaId" th:field="*{mascotaId}" class="form-control form-control-custom"
                                        th:disabled="${vacuna.id != null}" th:classappend="${#fields.hasErrors('mascotaId')} ? 'is-invalid'">
                                    <option value="">Seleccione una mascota...</option>
                                    <option th:each="m : ${mascotas}" 
                                            th:value="${m.id}" 
                                            th:data-especie="${m.especie.name()}"
                                            th:text="${m.nombre} + ' (' + ${m.especie} + ' - Propietario: ' + ${m.propietario.nombre} + ' ' + ${m.propietario.apellido} + ')'"
                                            th:selected="${m.id == vacuna.mascotaId}">Mascota</option>
                                </select>
                                <input type="hidden" th:if="${vacuna.id != null}" th:field="*{mascotaId}" />
                                <div class="invalid-feedback" th:if="${#fields.hasErrors('mascotaId')}" th:errors="*{mascotaId}"></div>
                            </div>

                            <!-- Estado Inicial -->
                            <div class="col-md-6">
                                <label for="estado" class="form-label-custom">
                                    <i class="bi bi-check-circle-fill me-1"></i> Estado Inicial
                                </label>
                                <select id="estado" th:field="*{estado}" class="form-control form-control-custom">
                                    <option th:value="${T(com.vetexpert.sistema_veterinaria.vacunacion.model.EstadoVacuna).APLICADA}">Aplicada (Hoy o Pasado)</option>
                                    <option th:value="${T(com.vetexpert.sistema_veterinaria.vacunacion.model.EstadoVacuna).PROGRAMADA}">Programada (Dosis Pendiente)</option>
                                </select>
                            </div>

                            <!-- Catálogo de Vacunas -->
                            <div class="col-md-6">
                                <label for="vacunaId" class="form-label-custom">
                                    <i class="bi bi-virus2 me-1"></i> Vacuna (Catálogo de Precios)
                                </label>
                                <select id="vacunaId" th:field="*{vacunaId}" class="form-control form-control-custom"
                                        th:classappend="${#fields.hasErrors('vacunaId')} ? 'is-invalid'">
                                    <option value="">Seleccione una vacuna...</option>
                                    <option th:each="v : ${vacunasCatalog}" 
                                            th:value="${v.id}" 
                                            th:data-precio="${v.precio}"
                                            th:data-laboratorio="${v.laboratorio}"
                                            th:data-nombre="${v.nombre}"
                                            th:text="${v.nombre} + ' (' + ${v.laboratorio} + ' - S/ ' + ${v.precio} + ')'"
                                            th:selected="${v.id == vacuna.vacunaId}">Vacuna</option>
                                </select>
                                <div class="invalid-feedback" th:if="${#fields.hasErrors('vacunaId')}" th:errors="*{vacunaId}"></div>
                            </div>

                            <!-- Precio Cobrado -->
                            <div class="col-md-6">
                                <label for="precioCobrado" class="form-label-custom">
                                    <i class="bi bi-currency-dollar me-1"></i> Precio a Cobrar (S/)
                                </label>
                                <input type="number" step="0.01" id="precioCobrado" th:field="*{precioCobrado}" 
                                       class="form-control form-control-custom" placeholder="0.00"
                                       th:classappend="${#fields.hasErrors('precioCobrado')} ? 'is-invalid'" />
                                <div class="invalid-feedback" th:if="${#fields.hasErrors('precioCobrado')}" th:errors="*{precioCobrado}"></div>
                            </div>

                            <!-- Fecha Aplicación -->
                            <div class="col-md-6">
                                <label for="fechaAplicacion" class="form-label-custom">
                                    <i class="bi bi-calendar-check me-1"></i> Fecha de Aplicación
                                </label>
                                <input type="date" id="fechaAplicacion" th:field="*{fechaAplicacion}" 
                                       class="form-control form-control-custom" 
                                       th:classappend="${#fields.hasErrors('fechaAplicacion')} ? 'is-invalid'" />
                                <div class="invalid-feedback" th:if="${#fields.hasErrors('fechaAplicacion')}" th:errors="*{fechaAplicacion}"></div>
                            </div>

                            <!-- Fecha Próxima Dosis -->
                            <div class="col-md-6">
                                <label for="fechaProximaDosis" class="form-label-custom">
                                    <i class="bi bi-calendar-event-fill me-1"></i> Próxima Dosis (Auto +1 Año)
                                </label>
                                <input type="date" id="fechaProximaDosis" th:field="*{fechaProximaDosis}" 
                                       class="form-control form-control-custom" 
                                       th:classappend="${#fields.hasErrors('fechaProximaDosis')} ? 'is-invalid'" />
                                <div class="invalid-feedback" th:if="${#fields.hasErrors('fechaProximaDosis')}" th:errors="*{fechaProximaDosis}"></div>
                            </div>

                            <!-- Lote -->
                            <div class="col-md-6">
                                <label for="lote" class="form-label-custom">
                                    <i class="bi bi-hash me-1"></i> Número de Lote
                                </label>
                                <input type="text" id="lote" th:field="*{lote}" class="form-control form-control-custom" 
                                       placeholder="Ej: L-340982" th:classappend="${#fields.hasErrors('lote')} ? 'is-invalid'" />
                                <div class="invalid-feedback" th:if="${#fields.hasErrors('lote')}" th:errors="*{lote}"></div>
                            </div>

                            <!-- Laboratorio -->
                            <div class="col-md-6">
                                <label for="laboratorio" class="form-label-custom">
                                    <i class="bi bi-building me-1"></i> Laboratorio
                                </label>
                                <input type="text" id="laboratorio" th:field="*{laboratorio}" class="form-control form-control-custom" 
                                       placeholder="Ej: Zoetis, Pfizer..." th:classappend="${#fields.hasErrors('laboratorio')} ? 'is-invalid'" />
                                <div class="invalid-feedback" th:if="${#fields.hasErrors('laboratorio')}" th:errors="*{laboratorio}"></div>
                            </div>

                            <!-- Veterinario -->
                            <div class="col-md-12">
                                <label for="veterinario" class="form-label-custom">
                                    <i class="bi bi-person-badge-fill me-1"></i> Veterinario Responsable
                                </label>
                                <input type="text" id="veterinario" th:field="*{veterinario}" class="form-control form-control-custom" 
                                       placeholder="Nombre y Apellido del Veterinario" 
                                       th:classappend="${#fields.hasErrors('veterinario')} ? 'is-invalid'" />
                                <div class="invalid-feedback" th:if="${#fields.hasErrors('veterinario')}" th:errors="*{veterinario}"></div>
                            </div>

                            <!-- Observaciones -->
                            <div class="col-md-12">
                                <label for="observaciones" class="form-label-custom">
                                    <i class="bi bi-chat-left-text me-1"></i> Observaciones (Máx 500 caracteres)
                                </label>
                                <textarea id="observaciones" th:field="*{observaciones}" class="form-control form-control-custom" 
                                          rows="3" placeholder="Información clínica adicional, efectos secundarios..."
                                          th:classappend="${#fields.hasErrors('observaciones')} ? 'is-invalid'"></textarea>
                                <div class="invalid-feedback" th:if="${#fields.hasErrors('observaciones')}" th:errors="*{observaciones}"></div>
                            </div>
                        </div>

                        <div class="form-footer mt-4">
                            <a th:href="@{/vacunas}" class="btn btn-secondary-custom">
                                <i class="bi bi-x-circle me-1"></i> Cancelar
                            </a>
                            <button type="submit" class="btn btn-primary-custom" id="btnGuardar">
                                <i class="bi bi-save me-1"></i> Guardar Registro
                            </button>
                        </div>

                    </form>
                </div>
            </div>

        </div>
    </div>

    <!-- Footer -->
    <footer th:replace="~{fragments/layout :: footer}"></footer>

    <div th:replace="~{fragments/layout :: scripts}"></div>

    <!-- JS de Lógica Inteligente -->
    <script th:inline="javascript">
        document.addEventListener('DOMContentLoaded', function() {
            const vacunaSelect = document.getElementById('vacunaId');
            const precioInput = document.getElementById('precioCobrado');
            const laboratorioInput = document.getElementById('laboratorio');
            const fechaAplicacionInput = document.getElementById('fechaAplicacion');
            const fechaProximaDosisInput = document.getElementById('fechaProximaDosis');

            // Establecer valores iniciales por defecto si no están definidos
            if (!fechaAplicacionInput.value && !/*[[${vacuna.id}]]*/ null) {
                const hoy = new Date();
                const yyyy = hoy.getFullYear();
                const mm = String(hoy.getMonth() + 1).padStart(2, '0');
                const dd = String(hoy.getDate()).padStart(2, '0');
                fechaAplicacionInput.value = `${yyyy}-${mm}-${dd}`;
            }

            function actualizarDetallesVacuna() {
                const selectedOption = vacunaSelect.options[vacunaSelect.selectedIndex];
                if (!selectedOption || !selectedOption.value) {
                    return;
                }

                const precio = selectedOption.getAttribute('data-precio');
                const laboratorio = selectedOption.getAttribute('data-laboratorio');

                if (precio && !precioInput.value) {
                    precioInput.value = parseFloat(precio).toFixed(2);
                }
                if (laboratorio && !laboratorioInput.value) {
                    laboratorioInput.value = laboratorio;
                }
            }

            function autocompletarFechaProxima() {
                const fechaAplicacionVal = fechaAplicacionInput.value;
                if (!fechaAplicacionVal) return;

                const date = new Date(fechaAplicacionVal + 'T00:00:00');
                date.setFullYear(date.getFullYear() + 1);
                const yyyy = date.getFullYear();
                const mm = String(date.getMonth() + 1).padStart(2, '0');
                const dd = String(date.getDate()).padStart(2, '0');
                fechaProximaDosisInput.value = `${yyyy}-${mm}-${dd}`;
            }

            // Listeners
            vacunaSelect.addEventListener('change', function() {
                // Al cambiar la vacuna, forzar actualización de precio y laboratorio
                const selectedOption = vacunaSelect.options[vacunaSelect.selectedIndex];
                if (selectedOption && selectedOption.value) {
                    precioInput.value = parseFloat(selectedOption.getAttribute('data-precio')).toFixed(2);
                    laboratorioInput.value = selectedOption.getAttribute('data-laboratorio');
                }
                autocompletarFechaProxima();
            });

            fechaAplicacionInput.addEventListener('change', autocompletarFechaProxima);

            // Cargar datos al inicio
            if (vacunaSelect.value) {
                actualizarDetallesVacuna();
            }
        });
    </script>
</body>
</html>
