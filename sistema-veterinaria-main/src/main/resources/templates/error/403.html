<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acceso Denegado | VET EXPERTS</title>
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">

    <style>
        :root {
            --navy-deep:    #0a1128;
            --navy-mid:     #001f54;
            --navy-light:   #034078;
            --accent-red:   #dc3545;
            --text-light:   #e8edf2;
            --text-muted:   #8fa3b8;
            --radius:       20px;
        }

        html, body {
            height: 100%;
            font-family: 'Inter', sans-serif;
            background: var(--navy-deep);
            color: var(--text-light);
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0;
            overflow: hidden;
        }

        .error-card {
            background: rgba(0, 31, 84, 0.4);
            border: 1px solid rgba(220, 53, 69, 0.2);
            border-radius: var(--radius);
            backdrop-filter: blur(15px);
            padding: 3rem;
            max-width: 500px;
            width: 90%;
            text-align: center;
            box-shadow: 0 20px 50px rgba(0,0,0,0.4), 0 0 40px rgba(220, 53, 69, 0.1);
            animation: fadeIn 0.6s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .error-icon {
            font-size: 5rem;
            color: var(--accent-red);
            text-shadow: 0 0 20px rgba(220, 53, 69, 0.5);
            margin-bottom: 1.5rem;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.05); }
            100% { transform: scale(1); }
        }

        .error-title {
            font-weight: 800;
            font-size: 1.75rem;
            margin-bottom: 1rem;
            letter-spacing: -0.02em;
        }

        .error-desc {
            color: var(--text-muted);
            font-size: 0.95rem;
            margin-bottom: 2rem;
            line-height: 1.6;
        }

        .btn-home {
            background: linear-gradient(135deg, #2d4a7a, #1a2a4a);
            color: #fff;
            border: 1px solid rgba(255,255,255,0.1);
            font-weight: 700;
            padding: 0.75rem 1.5rem;
            border-radius: 10px;
            text-decoration: none;
            transition: all 0.3s;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
        }

        .btn-home:hover {
            background: linear-gradient(135deg, #1a2a4a, #0a1128);
            border-color: rgba(255,255,255,0.25);
            color: #fff;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
        }
    </style>
</head>
<body>

    <div class="error-card">
        <i class="bi bi-shield-slash-fill error-icon"></i>
        <h1 class="error-title">Acceso Denegado (403)</h1>
        <p class="error-desc">
            No tienes los permisos requeridos para acceder a esta ruta. Si consideras que se trata de un error, por favor contacta al administrador del sistema.
        </p>
        <a th:href="@{/dashboard}" class="btn-home">
            <i class="bi bi-house-door-fill"></i> Ir al Inicio
        </a>
    </div>

</body>
</html>
