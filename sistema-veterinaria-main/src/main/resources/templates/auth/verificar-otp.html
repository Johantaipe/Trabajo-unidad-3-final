<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verificar Código OTP - VET EXPERTS</title>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <!-- Custom Public CSS -->
    <link th:href="@{/css/public.css}" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, rgba(82, 183, 136, 0.08) 0%, rgba(247, 176, 50, 0.04) 100%), #f4f7f5;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem 1rem;
        }
        .otp-card {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.5);
            border-radius: 32px;
            box-shadow: var(--shadow-lg);
            padding: 3rem;
            max-width: 500px;
            width: 100%;
            text-align: center;
        }
        .otp-input-container {
            display: flex;
            justify-content: space-between;
            gap: 0.5rem;
            margin: 2rem 0;
        }
        .otp-digit {
            width: 50px;
            height: 60px;
            font-size: 1.8rem;
            font-weight: 700;
            text-align: center;
            border-radius: 12px;
            border: 1.5px solid rgba(0, 0, 0, 0.1);
            transition: var(--transition);
        }
        .otp-digit:focus {
            box-shadow: 0 0 0 3px rgba(82, 183, 136, 0.25);
            border-color: var(--primary-light);
            outline: none;
        }
        .btn-primary-custom {
            background-color: var(--primary);
            border: none;
            border-radius: 12px;
            padding: 0.8rem;
            font-weight: 700;
            color: white;
            transition: var(--transition);
            width: 100%;
        }
        .btn-primary-custom:hover {
            background-color: var(--primary-dark);
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(45, 106, 79, 0.3);
        }
    </style>
</head>
<body>

    <div class="otp-card">
        <div class="mb-4">
            <i class="bi bi-shield-lock-fill text-success" style="font-size: 3rem;"></i>
            <h3 class="fw-extrabold text-dark mt-2">Verificar Cuenta</h3>
            <p class="text-muted small">
                Hemos enviado un código OTP de 6 dígitos al correo:<br>
                <strong class="text-dark" th:text="${email}">correo@ejemplo.com</strong>
            </p>
        </div>

        <div th:if="${mensajeExito}" class="alert alert-success border-0 rounded-4 shadow-sm mb-4" role="alert">
            <span th:text="${mensajeExito}">Éxito</span>
        </div>
        <div th:if="${errorOtp}" class="alert alert-danger border-0 rounded-4 shadow-sm mb-4" role="alert">
            <span th:text="${errorOtp}">Error</span>
        </div>

        <form th:action="@{/verificar-otp}" method="POST" id="otpForm">
            <!-- Email field passed dynamically -->
            <input type="hidden" name="email" th:value="${email}">
            
            <!-- Target field to accumulate the digits -->
            <input type="hidden" name="otp" id="finalOtp">

            <div class="otp-input-container">
                <input type="text" class="otp-digit" maxlength="1" pattern="[0-9]" required autocomplete="off">
                <input type="text" class="otp-digit" maxlength="1" pattern="[0-9]" required autocomplete="off">
                <input type="text" class="otp-digit" maxlength="1" pattern="[0-9]" required autocomplete="off">
                <input type="text" class="otp-digit" maxlength="1" pattern="[0-9]" required autocomplete="off">
                <input type="text" class="otp-digit" maxlength="1" pattern="[0-9]" required autocomplete="off">
                <input type="text" class="otp-digit" maxlength="1" pattern="[0-9]" required autocomplete="off">
            </div>

            <button type="submit" class="btn btn-primary-custom ripple-btn">Validar y Activar Cuenta</button>
        </form>

        <div class="text-center mt-4">
            <span class="text-muted small">¿Problemas con el código? <a th:href="@{/registro-cliente}" class="text-success fw-bold text-decoration-none">Volver a registrarse</a></span>
        </div>
    </div>

    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        const digits = document.querySelectorAll('.otp-digit');
        const finalOtpInput = document.getElementById('finalOtp');
        const form = document.getElementById('otpForm');

        digits.forEach((digit, index) => {
            // Focus on first box
            if (index === 0) digit.focus();

            digit.addEventListener('input', function(e) {
                // Remove non-numeric
                this.value = this.value.replace(/[^0-9]/g, '');

                if (this.value.length === 1 && index < digits.length - 1) {
                    digits[index + 1].focus();
                }
                combineDigits();
            });

            digit.addEventListener('keydown', function(e) {
                if (e.key === 'Backspace' && this.value.length === 0 && index > 0) {
                    digits[index - 1].focus();
                }
            });
            
            digit.addEventListener('paste', function(e) {
                e.preventDefault();
                const text = (e.clipboardData || window.clipboardData).getData('text').trim();
                if (/^[0-9]{6}$/.test(text)) {
                    for (let i = 0; i < digits.length; i++) {
                        digits[i].value = text[i];
                    }
                    combineDigits();
                    digits[digits.length - 1].focus();
                }
            });
        });

        function combineDigits() {
            let val = '';
            digits.forEach(d => val += d.value);
            finalOtpInput.value = val;
        }

        form.addEventListener('submit', function(e) {
            combineDigits();
            if (finalOtpInput.value.length !== 6) {
                e.preventDefault();
            }
        });
    </script>
</body>
</html>
