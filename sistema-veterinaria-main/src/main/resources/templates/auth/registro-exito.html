<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro Exitoso - VET EXPERTS</title>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <!-- Custom Public CSS -->
    <link th:href="@{/css/public.css}" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, rgba(82, 183, 136, 0.08) 0%, rgba(247, 176, 50, 0.04) 100%), #f4f7f5;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem 1rem;
        }
        .success-card {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.5);
            border-radius: 32px;
            box-shadow: var(--shadow-lg);
            padding: 4rem 3rem;
            max-width: 520px;
            width: 100%;
            text-align: center;
        }
        .success-icon-wrapper {
            width: 100px;
            height: 100px;
            background-color: rgba(82, 183, 136, 0.1);
            color: var(--primary);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 3.5rem;
            margin: 0 auto 2rem auto;
            position: relative;
            animation: pulse 2s infinite;
        }
        @keyframes pulse {
            0% {
                box-shadow: 0 0 0 0 rgba(82, 183, 136, 0.4);
            }
            70% {
                box-shadow: 0 0 0 20px rgba(82, 183, 136, 0);
            }
            100% {
                box-shadow: 0 0 0 0 rgba(82, 183, 136, 0);
            }
        }
        .btn-primary-custom {
            background-color: var(--primary);
            border: none;
            border-radius: 12px;
            padding: 0.8rem;
            font-weight: 700;
            color: white;
            transition: var(--transition);
            width: 100%;
            text-decoration: none;
            display: inline-block;
        }
        .btn-primary-custom:hover {
            background-color: var(--primary-dark);
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(45, 106, 79, 0.3);
            color: white;
        }
    </style>
</head>
<body>

    <div class="success-card">
        <div class="success-icon-wrapper">
            <i class="bi bi-check-circle-fill"></i>
        </div>
        
        <h3 class="fw-extrabold text-dark mb-2">¡Cuenta Creada con Éxito!</h3>
        <p class="text-muted mb-4">
            Tu cuenta de cliente en <strong>Vet Experts</strong> ha sido creada y verificada correctamente.<br>
            Ya puedes acceder a todos nuestros servicios desde tu portal de cliente.
        </p>

        <a th:href="@{/login-cliente}" class="btn btn-primary-custom ripple-btn">Iniciar Sesión</a>
    </div>

    <!-- Bootstrap 5 JS Bundle -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
