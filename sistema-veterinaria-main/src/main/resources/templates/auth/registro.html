<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Regístrate en VET EXPERTS y accede a tu cuenta.">
    <title>Crear Cuenta | VET EXPERTS</title>

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">

    <!-- Custom CSS -->
    <link th:href="@{/css/public.css}" rel="stylesheet">

    <!-- Favicon -->
    <link rel="icon" type="image/png" th:href="@{/img/logo.png}">
</head>
<body>

<div class="auth-premium-bg">
    <div class="auth-card-custom">
        <div class="auth-header">
            <a th:href="@{/}" class="text-decoration-none d-block mb-3">
                <img th:src="@{/img/logo.png}" alt="VET EXPERTS" style="height: 60px;">
            </a>
            <h3 class="fw-bold text-white mb-1">Únete a VET EXPERTS</h3>
            <p class="text-white-50 mb-0">Crea tu cuenta de cliente en segundos</p>
        </div>
        <div class="auth-body">
            
            <!-- Alert de Error -->
            <div th:if="${error}" class="alert alert-danger d-flex align-items-center gap-2 alert-dismissible fade show" role="alert">
                <i class="bi bi-exclamation-triangle-fill"></i>
                <span th:text="${error}">Mensaje de error</span>
                <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
            </div>

            <form th:action="@{/auth/registro}" method="post">
                <div class="mb-3">
                    <label for="username" class="form-label fw-semibold text-dark">Nombre de Usuario</label>
                    <div class="input-group">
                        <span class="input-group-text bg-light border-end-0 text-muted"><i class="bi bi-person"></i></span>
                        <input type="text" class="form-control bg-light border-start-0 ps-0" id="username" name="username" th:value="${username}" placeholder="Ej: mimascota123" required>
                    </div>
                </div>

                <div class="mb-3">
                    <label for="password" class="form-label fw-semibold text-dark">Contraseña</label>
                    <div class="input-group">
                        <span class="input-group-text bg-light border-end-0 text-muted"><i class="bi bi-lock"></i></span>
                        <input type="password" class="form-control bg-light border-start-0 ps-0" id="password" name="password" placeholder="Mínimo 6 caracteres" required>
                    </div>
                </div>

                <div class="mb-4">
                    <label for="confirmPassword" class="form-label fw-semibold text-dark">Confirmar Contraseña</label>
                    <div class="input-group">
                        <span class="input-group-text bg-light border-end-0 text-muted"><i class="bi bi-check-circle"></i></span>
                        <input type="password" class="form-control bg-light border-start-0 ps-0" id="confirmPassword" name="confirmPassword" placeholder="Repite tu contraseña" required>
                    </div>
                </div>

                <button type="submit" class="btn btn-crear-cuenta w-100 py-2.5 fs-6 mb-3 text-dark">
                    <i class="bi bi-person-plus-fill me-1"></i> Registrarse
                </button>

                <div class="text-center">
                    <span class="text-muted small">¿Ya tienes una cuenta? </span>
                    <a th:href="@{/auth/login}" class="text-decoration-none fw-bold small" style="color: var(--primary);">Ingresa aquí</a>
                </div>
            </form>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
