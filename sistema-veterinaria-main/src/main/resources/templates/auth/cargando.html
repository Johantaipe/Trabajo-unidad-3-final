<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cargando... - VET EXPERTS</title>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <!-- Custom Public CSS -->
    <link th:href="@{/css/public.css}" rel="stylesheet">
    <style>
        :root {
            --primary: #2d6a4f;
            --primary-light: #52b788;
            --secondary: #f7b032;
            --dark: #1d2d24;
        }
        body {
            background: linear-gradient(135deg, rgba(82, 183, 136, 0.08) 0%, rgba(247, 176, 50, 0.04) 100%), #f4f7f5;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Plus Jakarta Sans', sans-serif;
            overflow: hidden;
        }
        .loader-card {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.6);
            border-radius: 32px;
            box-shadow: 0 20px 40px rgba(29, 45, 36, 0.1);
            padding: 4rem 3rem;
            max-width: 500px;
            width: 100%;
            text-align: center;
            position: relative;
        }
        .loader-title {
            color: var(--dark);
            font-weight: 800;
            font-size: 1.8rem;
            margin-bottom: 0.5rem;
        }
        .loader-subtitle {
            color: #62756a;
            font-weight: 600;
            font-size: 1rem;
            margin-bottom: 2.5rem;
            animation: pulseText 1.5s infinite ease-in-out;
        }
        
        /* Track and Running Dog Animation */
        .run-track {
            position: relative;
            width: 100%;
            height: 70px;
            background: rgba(82, 183, 136, 0.05);
            border: 1px dashed rgba(82, 183, 136, 0.2);
            border-radius: 20px;
            margin-bottom: 1.5rem;
            overflow: hidden;
        }
        .running-dog {
            position: absolute;
            left: 0;
            bottom: 8px;
            font-size: 2.8rem;
            color: var(--primary);
            animation: runRight 1.5s infinite linear;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .dog-body {
            display: inline-block;
            animation: dogBobbing 0.25s infinite ease-in-out;
        }
        .paws-dust {
            display: flex;
            gap: 4px;
            margin-top: -8px;
            opacity: 0.7;
        }
        .dust-dot {
            width: 5px;
            height: 5px;
            background-color: var(--secondary);
            border-radius: 50%;
            animation: dustFloat 0.25s infinite linear;
        }
        .dust-dot:nth-child(2) {
            animation-delay: 0.1s;
        }
        
        /* Keyframes */
        @keyframes runRight {
            0% { left: -60px; }
            100% { left: calc(100% + 10px); }
        }
        @keyframes dogBobbing {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            50% { transform: translateY(-8px) rotate(4deg); }
        }
        @keyframes dustFloat {
            0% { transform: scale(1) translateY(0); opacity: 1; }
            100% { transform: scale(0) translateY(8px); opacity: 0; }
        }
        @keyframes pulseText {
            0%, 100% { opacity: 0.6; }
            50% { opacity: 1; }
        }

        /* Progress Bar */
        .progress-container {
            width: 100%;
            height: 8px;
            background: rgba(0, 0, 0, 0.05);
            border-radius: 4px;
            overflow: hidden;
        }
        .progress-bar-custom {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, var(--primary-light) 0%, var(--primary) 100%);
            border-radius: 4px;
            transition: width 0.05s linear;
        }
        
        /* Floating background paw prints */
        .bg-paw {
            position: absolute;
            color: rgba(82, 183, 136, 0.06);
            font-size: 6rem;
            z-index: -1;
        }
    </style>
</head>
<body>

    <!-- Background Paw prints decoration -->
    <div class="bg-paw" style="top: 10%; left: 10%; transform: rotate(15deg);"><i class="bi bi-paw-fill"></i></div>
    <div class="bg-paw" style="bottom: 10%; right: 10%; transform: rotate(-25deg);"><i class="bi bi-paw-fill"></i></div>

    <div class="loader-card">
        <div class="mb-4">
            <img th:src="@{/img/logo.png}" alt="Logo" style="height: 60px;" class="mb-2">
        </div>
        <h3 class="loader-title">VET EXPERTS</h3>
        <p class="loader-subtitle" id="statusText">Cargando tu información...</p>
        
        <!-- Track of the running dog -->
        <div class="run-track">
            <div class="running-dog">
                <span class="dog-body"><i class="bi bi-dog"></i></span>
                <div class="paws-dust">
                    <span class="dust-dot"></span>
                    <span class="dust-dot"></span>
                </div>
            </div>
        </div>

        <!-- Progress Bar -->
        <div class="progress-container">
            <div class="progress-bar-custom" id="loadingBar"></div>
        </div>
    </div>

    <!-- Script for simulated progress and redirection -->
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const loadingBar = document.getElementById('loadingBar');
            const statusText = document.getElementById('statusText');
            const statuses = [
                "Cargando tu información...",
                "Sincronizando tus mascotas...",
                "Preparando tu agenda...",
                "¡Todo listo! Redirigiendo..."
            ];
            
            let progress = 0;
            const duration = 1500; // 1.5 seconds
            const stepTime = 30; // 30ms updates
            const totalSteps = duration / stepTime;
            const progressPerStep = 100 / totalSteps;

            const timer = setInterval(() => {
                progress += progressPerStep;
                if (progress >= 100) {
                    progress = 100;
                    clearInterval(timer);
                    setTimeout(() => {
                        window.location.href = '/portal-cliente/dashboard';
                    }, 100);
                }
                
                loadingBar.style.width = progress + '%';
                
                // Dynamically update status text based on progress
                if (progress < 25) {
                    statusText.innerText = statuses[0];
                } else if (progress < 55) {
                    statusText.innerText = statuses[1];
                } else if (progress < 85) {
                    statusText.innerText = statuses[2];
                } else {
                    statusText.innerText = statuses[3];
                }
            }, stepTime);
        });
    </script>
</body>
</html>
