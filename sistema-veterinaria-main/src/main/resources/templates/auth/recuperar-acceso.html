<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recuperar Contraseña - VET EXPERTS</title>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <!-- Custom Public CSS -->
    <link th:href="@{/css/public.css}" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, rgba(82, 183, 136, 0.08) 0%, rgba(247, 176, 50, 0.04) 100%), #f4f7f5;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem 1rem;
        }
        .recovery-card {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.5);
            border-radius: 32px;
            box-shadow: var(--shadow-lg);
            padding: 3rem;
            max-width: 500px;
            width: 100%;
            text-align: center;
        }
        .form-control {
            border-radius: 12px;
            padding: 0.75rem 1rem;
            border: 1px solid rgba(0, 0, 0, 0.1);
            transition: var(--transition);
        }
        .form-control:focus {
            box-shadow: 0 0 0 3px rgba(82, 183, 136, 0.2);
            border-color: var(--primary-light);
        }
        .btn-primary-custom {
            background-color: var(--primary);
            border: none;
            border-radius: 12px;
            padding: 0.8rem;
            font-weight: 700;
            color: white;
            transition: var(--transition);
            width: 100%;
        }
        .btn-primary-custom:hover {
            background-color: var(--primary-dark);
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(45, 106, 79, 0.3);
        }
    </style>
</head>
<body>

    <div class="recovery-card">
        <div class="mb-4">
            <i class="bi bi-key-fill text-success" style="font-size: 3rem;"></i>
            <h3 class="fw-extrabold text-dark mt-2">¿Olvidaste tu contraseña?</h3>
            <p class="text-muted small">Ingresa el correo electrónico asociado a tu cuenta de cliente y te enviaremos un enlace de recuperación.</p>
        </div>

        <div th:if="${errorEmail}" class="alert alert-danger border-0 rounded-4 shadow-sm mb-4" role="alert">
            <span th:text="${errorEmail}">Error</span>
        </div>

        <form th:action="@{/recuperar-acceso}" method="POST">
            <div class="mb-3 text-start">
                <label for="email" class="form-label fw-semibold">Correo Electrónico</label>
                <input type="email" class="form-control" id="email" name="email" placeholder="correo@ejemplo.com" required>
            </div>

            <button type="submit" class="btn btn-primary-custom ripple-btn mt-2">Enviar Enlace</button>
        </form>

        <div class="text-center mt-4">
            <span class="text-muted small"><a th:href="@{/login-cliente}" class="text-success fw-bold text-decoration-none">Volver al Login</a></span>
        </div>
    </div>

    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
