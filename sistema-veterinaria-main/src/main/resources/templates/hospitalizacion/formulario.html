<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head th:replace="~{fragments/layout :: head('Hospitalizar Mascota')}">
</head>
<body>

    <!-- Fixed Left Sidebar & Mobile topbar -->
    <nav th:replace="~{fragments/layout :: navbar}"></nav>

    <!-- Main Content -->
    <div class="main-content">
        <div class="container">

            <div class="form-card-wrapper">
                <div class="form-card">
                    <div class="form-header">
                        <h4>Hospitalizar Mascota</h4>
                        <p>Registre el ingreso e internamiento clínico de la mascota.</p>
                    </div>

                    <form th:action="@{/hospitalizacion/guardar}" th:object="${hospitalizacion}" method="post" class="form-body">
                        <input type="hidden" th:field="*{id}" />

                        <div class="row g-3">
                            <!-- Mascota -->
                            <div class="col-md-12">
                                <label for="mascota" class="form-label-custom">Mascota a Hospitalizar</label>
                                <select id="mascota" th:field="*{mascota.id}" class="form-control form-control-custom" th:classappend="${#fields.hasErrors('mascota')} ? 'is-invalid'">
                                    <option value="">Seleccione mascota...</option>
                                    <option th:each="m : ${mascotas}" 
                                            th:value="${m.id}" 
                                            th:text="${m.nombre} + ' (' + ${m.especie} + ' - Propietario: ' + ${m.propietario.nombre} + ' ' + ${m.propietario.apellido} + ')'"></option>
                                </select>
                                <div class="invalid-feedback" th:if="${#fields.hasErrors('mascota')}" th:errors="*{mascota}"></div>
                            </div>

                            <!-- Fecha de Ingreso -->
                            <div class="col-md-6">
                                <label for="fechaIngreso" class="form-label-custom">Fecha de Ingreso</label>
                                <input type="date" id="fechaIngreso" th:field="*{fechaIngreso}" class="form-control form-control-custom" th:classappend="${#fields.hasErrors('fechaIngreso')} ? 'is-invalid'" />
                                <div class="invalid-feedback" th:if="${#fields.hasErrors('fechaIngreso')}" th:errors="*{fechaIngreso}"></div>
                            </div>

                            <!-- Costo de Hospitalización por día -->
                            <div class="col-md-6">
                                <label for="precioPorDia" class="form-label-custom">Costo por Día (S/)</label>
                                <input type="number" step="0.01" id="precioPorDia" th:field="*{precioPorDia}" class="form-control form-control-custom" th:classappend="${#fields.hasErrors('precioPorDia')} ? 'is-invalid'" />
                                <div class="invalid-feedback" th:if="${#fields.hasErrors('precioPorDia')}" th:errors="*{precioPorDia}"></div>
                            </div>

                            <!-- Motivo de Ingreso -->
                            <div class="col-md-12">
                                <label for="motivo" class="form-label-custom">Motivo de Ingreso</label>
                                <textarea id="motivo" th:field="*{motivo}" class="form-control form-control-custom" rows="3" placeholder="Ej: Observación postoperatoria, deshidratación severa..." th:classappend="${#fields.hasErrors('motivo')} ? 'is-invalid'"></textarea>
                                <div class="invalid-feedback" th:if="${#fields.hasErrors('motivo')}" th:errors="*{motivo}"></div>
                            </div>

                            <!-- Observaciones Iniciales -->
                            <div class="col-md-12">
                                <label for="observaciones" class="form-label-custom">Observaciones Iniciales</label>
                                <textarea id="observaciones" th:field="*{observaciones}" class="form-control form-control-custom" rows="3" placeholder="Estado general del animal al ingresar..."></textarea>
                            </div>
                        </div>

                        <div class="form-footer mt-4">
                            <a th:href="@{/hospitalizacion}" class="btn btn-secondary-custom">
                                <i class="bi bi-x-circle me-1"></i> Cancelar
                            </a>
                            <button type="submit" class="btn btn-primary-custom">
                                <i class="bi bi-save me-1"></i> Confirmar Ingreso
                            </button>
                        </div>
                    </form>
                </div>
            </div>

        </div>
    </div>

    <!-- Footer -->
    <footer th:replace="~{fragments/layout :: footer}"></footer>

    <div th:replace="~{fragments/layout :: scripts}"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const dateInput = document.getElementById('fechaIngreso');
            if (dateInput && !dateInput.value) {
                const hoy = new Date();
                const yyyy = hoy.getFullYear();
                const mm = String(hoy.getMonth() + 1).padStart(2, '0');
                const dd = String(hoy.getDate()).padStart(2, '0');
                dateInput.value = `${yyyy}-${mm}-${dd}`;
            }
        });
    </script>
</body>
</html>
