<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head th:replace="~{fragments/layout :: head(${promocion.id != null ? 'Editar Promoción' : 'Nueva Promoción'})}">
</head>
<body>

    <!-- Fixed Left Sidebar & Mobile topbar -->
    <nav th:replace="~{fragments/layout :: navbar}"></nav>

    <!-- Main Content -->
    <div class="main-content">
        <div class="container">

            <div class="page-header">
                <h1 class="page-title">
                    <i class="bi bi-tag-fill me-2" style="color: var(--primary);"></i>
                    <span th:text="${promocion.id != null ? 'Editar Promoción' : 'Registrar Promoción'}">Formulario</span>
                </h1>
                <a th:href="@{/promociones}" class="btn btn-secondary">
                    <i class="bi bi-arrow-left-circle me-1"></i> Regresar
                </a>
            </div>

            <div class="card-custom">
                <div class="card-header-custom">
                    <i class="bi bi-card-checklist me-1"></i> Datos de la Promoción
                </div>
                <div class="card-body-custom p-4">
                    
                    <form th:action="${promocion.id != null ? '/promociones/actualizar/' + promocion.id : '/promociones/guardar'}" 
                          method="post" 
                          th:object="${promocion}" 
                          enctype="multipart/form-data">
                        
                        <div class="row g-3">
                            <!-- Titulo -->
                            <div class="col-md-6">
                                <label for="titulo" class="form-label fw-bold">Título de la Promoción</label>
                                <input type="text" 
                                       id="titulo" 
                                       th:field="*{titulo}" 
                                       class="form-control" 
                                       th:classappend="${#fields.hasErrors('titulo')} ? 'is-invalid'"
                                       placeholder="Ej: Descuento en Baños" required>
                                <div class="invalid-feedback" th:if="${#fields.hasErrors('titulo')}" th:errors="*{titulo}">Error</div>
                            </div>

                            <!-- Descuento -->
                            <div class="col-md-6">
                                <label for="descuento" class="form-label fw-bold">Descuento / Incentivo</label>
                                <input type="text" 
                                       id="descuento" 
                                       th:field="*{descuento}" 
                                       class="form-control" 
                                       th:classappend="${#fields.hasErrors('descuento')} ? 'is-invalid'"
                                       placeholder="Ej: 20% OFF, S/ 30 de Dto" required>
                                <div class="invalid-feedback" th:if="${#fields.hasErrors('descuento')}" th:errors="*{descuento}">Error</div>
                            </div>

                            <!-- Descripcion -->
                            <div class="col-12">
                                <label for="descripcion" class="form-label fw-bold">Descripción / Términos de la oferta</label>
                                <textarea id="descripcion" 
                                          th:field="*{descripcion}" 
                                          class="form-control" 
                                          rows="3" 
                                          th:classappend="${#fields.hasErrors('descripcion')} ? 'is-invalid'"
                                          placeholder="Escribe aquí los detalles y condiciones..." required></textarea>
                                <div class="invalid-feedback" th:if="${#fields.hasErrors('descripcion')}" th:errors="*{descripcion}">Error</div>
                            </div>

                            <!-- Fecha Inicio -->
                            <div class="col-md-6">
                                <label for="fechaInicio" class="form-label fw-bold">Fecha de Inicio</label>
                                <input type="date" 
                                       id="fechaInicio" 
                                       th:field="*{fechaInicio}" 
                                       class="form-control" 
                                       th:classappend="${#fields.hasErrors('fechaInicio')} ? 'is-invalid'" required>
                                <div class="invalid-feedback" th:if="${#fields.hasErrors('fechaInicio')}" th:errors="*{fechaInicio}">Error</div>
                            </div>

                            <!-- Fecha Fin -->
                            <div class="col-md-6">
                                <label for="fechaFin" class="form-label fw-bold">Fecha de Expiración</label>
                                <input type="date" 
                                       id="fechaFin" 
                                       th:field="*{fechaFin}" 
                                       class="form-control" 
                                       th:classappend="${#fields.hasErrors('fechaFin')} ? 'is-invalid'" required>
                                <div class="invalid-feedback" th:if="${#fields.hasErrors('fechaFin')}" th:errors="*{fechaFin}">Error</div>
                            </div>

                            <!-- Imagen Upload -->
                            <div class="col-md-6">
                                <label for="imagenFile" class="form-label fw-bold">Fotografía / Banner de Promoción</label>
                                <input type="file" id="imagenFile" name="imagenFile" class="form-control" accept="image/*">
                                <small class="text-muted d-block mt-1">Sube una imagen horizontal atractiva (PNG, JPG).</small>
                                
                                <!-- Vista previa si ya existe imagen -->
                                <div th:if="*{imagenUrl != null}" class="mt-3">
                                    <span class="d-block small text-muted mb-1">Imagen actual:</span>
                                    <img th:src="*{imagenUrl}" alt="Banner" class="img-fluid rounded border shadow-sm" style="max-height: 150px;">
                                </div>
                            </div>

                            <!-- Estado Activo -->
                            <div class="col-md-6 d-flex align-items-center">
                                <div class="form-check form-switch mt-md-4">
                                    <input type="checkbox" id="activo" th:field="*{activo}" class="form-check-input" checked>
                                    <label for="activo" class="form-check-label fw-semibold text-dark">Promoción Activa (visible en landing page si está en fecha)</label>
                                </div>
                            </div>
                        </div>

                        <hr class="my-4">

                        <div class="d-flex justify-content-end gap-2">
                            <a th:href="@{/promociones}" class="btn btn-secondary px-4">Cancelar</a>
                            <button type="submit" class="btn btn-primary-custom px-4">
                                <i class="bi bi-save-fill me-1"></i> Guardar Promoción
                            </button>
                        </div>
                    </form>
                </div>
            </div>

        </div>
    </div>

    <!-- Footer -->
    <footer th:replace="~{fragments/layout :: footer}"></footer>

    <div th:replace="~{fragments/layout :: scripts}"></div>
</body>
</html>
