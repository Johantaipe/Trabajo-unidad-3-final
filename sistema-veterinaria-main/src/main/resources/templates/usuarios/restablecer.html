<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head th:replace="~{fragments/layout :: head('Restablecer Contraseña')}">
</head>
<body>

    <!-- Fixed Left Sidebar & Mobile topbar -->
    <nav th:replace="~{fragments/layout :: navbar}"></nav>

    <!-- Main Content -->
    <div class="main-content">
        <div class="container">
            
            <div class="page-header">
                <h1 class="page-title">
                    <i class="bi bi-key-fill me-2" style="color: var(--primary);"></i>
                    Restablecer Contraseña
                </h1>
            </div>

            <!-- Menú de opciones del Módulo de Usuarios -->
            <div class="card-custom mb-4">
                <div class="card-body-custom py-2 px-3 d-flex flex-wrap gap-2">
                    <a th:href="@{/usuarios}" class="btn btn-sm btn-outline-secondary"><i class="bi bi-list-ul me-1"></i> Lista de Usuarios</a>
                    <a th:href="@{/usuarios/nuevo}" class="btn btn-sm btn-outline-secondary"><i class="bi bi-person-plus-fill me-1"></i> Nuevo Usuario</a>
                    <a th:href="@{/usuarios/roles}" class="btn btn-sm btn-outline-secondary"><i class="bi bi-shield-lock-fill me-1"></i> Roles de Acceso</a>
                </div>
            </div>

            <!-- Formulario de Reset -->
            <div class="row justify-content-center">
                <div class="col-lg-6 col-md-8">
                    <div class="card-custom">
                        <div class="card-header-custom">
                            <i class="bi bi-lock-fill me-1"></i> Nueva Contraseña para <span th:text="${usuario.username}">usuario</span>
                        </div>
                        <div class="card-body-custom p-4">
                            <form th:action="@{/usuarios/restablecer-password/{id}(id=${usuario.id})}" method="POST">

                                <div class="mb-3">
                                    <label for="password" class="form-label fw-bold">Nueva Contraseña <span class="text-danger">*</span></label>
                                    <input type="password" 
                                           id="password" 
                                           name="password" 
                                           class="form-control" 
                                           th:classappend="${errorPassword} ? 'is-invalid'"
                                           placeholder="Mínimo 6 caracteres" 
                                           required>
                                    <div class="invalid-feedback" th:if="${errorPassword}" th:text="${errorPassword}">Error</div>
                                </div>

                                <div class="mb-3">
                                    <label for="confirmPassword" class="form-label fw-bold">Confirmar Nueva Contraseña <span class="text-danger">*</span></label>
                                    <input type="password" 
                                           id="confirmPassword" 
                                           name="confirmPassword" 
                                           class="form-control" 
                                           th:classappend="${errorConfirmPassword} ? 'is-invalid'"
                                           placeholder="Repite la contraseña" 
                                           required>
                                    <div class="invalid-feedback" th:if="${errorConfirmPassword}" th:text="${errorConfirmPassword}">Error</div>
                                </div>

                                <!-- Botones -->
                                <div class="d-flex justify-content-end gap-2 mt-4">
                                    <a th:href="@{/usuarios}" class="btn btn-outline-secondary">Cancelar</a>
                                    <button type="submit" class="btn btn-primary">
                                        <i class="bi bi-check2-circle me-1"></i> Restablecer Contraseña
                                    </button>
                                </div>

                            </form>
                        </div>
                    </div>
                </div>
            </div>

        </div>
    </div>

    <!-- Footer -->
    <footer th:replace="~{fragments/layout :: footer}"></footer>

    <div th:replace="~{fragments/layout :: scripts}"></div>
</body>
</html>
