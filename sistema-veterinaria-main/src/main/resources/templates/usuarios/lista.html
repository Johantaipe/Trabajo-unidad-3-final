<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head th:replace="~{fragments/layout :: head('Gestión de Usuarios')}">
</head>
<body>

    <!-- Fixed Left Sidebar & Mobile topbar -->
    <nav th:replace="~{fragments/layout :: navbar}"></nav>

    <!-- Main Content -->
    <div class="main-content">
        <div class="container">
            
            <div class="page-header d-flex justify-content-between align-items-center flex-wrap gap-3">
                <h1 class="page-title mb-0">
                    <i class="bi bi-people-fill me-2" style="color: var(--primary);"></i>
                    Módulo de Usuarios
                </h1>
                <a th:href="@{/usuarios/nuevo}" class="btn btn-primary d-flex align-items-center gap-1">
                    <i class="bi bi-person-plus-fill"></i> Nuevo Usuario
                </a>
            </div>

            <!-- Menú de opciones del Módulo de Usuarios -->
            <div class="card-custom mb-4">
                <div class="card-body-custom py-2 px-3 d-flex flex-wrap gap-2">
                    <a th:href="@{/usuarios}" class="btn btn-sm btn-primary active"><i class="bi bi-list-ul me-1"></i> Lista de Usuarios</a>
                    <a th:href="@{/usuarios/nuevo}" class="btn btn-sm btn-outline-secondary"><i class="bi bi-person-plus-fill me-1"></i> Nuevo Usuario</a>
                    <a th:href="@{/usuarios/roles}" class="btn btn-sm btn-outline-secondary"><i class="bi bi-shield-lock-fill me-1"></i> Roles de Acceso</a>
                </div>
            </div>

            <!-- Alertas de éxito -->
            <div th:if="${mensajeExito}" class="alert alert-success alert-dismissible fade show border-0 rounded-3 shadow-sm mb-4" role="alert">
                <i class="bi bi-check-circle-fill me-2"></i>
                <span th:text="${mensajeExito}">Operación exitosa</span>
                <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
            </div>

            <!-- Tabla de Usuarios -->
            <div class="card-custom">
                <div class="card-header-custom d-flex justify-content-between align-items-center">
                    <div>
                        <i class="bi bi-person-lines-fill me-1"></i> Cuentas del Personal Interno y Clientes
                    </div>
                </div>
                <div class="card-body-custom p-0">
                    <div class="table-responsive">
                        <table class="table table-custom mb-0">
                            <thead>
                                <tr>
                                    <th>Nombre Completo</th>
                                    <th>Correo</th>
                                    <th>Usuario</th>
                                    <th>Rol</th>
                                    <th>Estado</th>
                                    <th class="text-end">Acciones</th>
                                </tr>
                            </thead>
                            <tbody>
                                <tr th:each="user : ${usuarios}">
                                    <td>
                                        <div class="d-flex align-items-center gap-2">
                                            <i class="bi bi-person-circle fs-5 text-secondary"></i>
                                            <div>
                                                <strong th:text="${user.nombre + ' ' + user.apellido}">Juan Perez</strong>
                                            </div>
                                        </div>
                                    </td>
                                    <td th:text="${user.correo != null ? user.correo : '—'}">correo@vetexperts.com</td>
                                    <td th:text="${user.username}">usuario123</td>
                                    <td>
                                        <span th:if="${user.rol == 'ADMIN'}" class="badge bg-danger text-white rounded-3 py-1 px-2.5">ADMINISTRADOR</span>
                                        <span th:if="${user.rol == 'SECRETARIA'}" class="badge bg-primary text-white rounded-3 py-1 px-2.5">SECRETARIA</span>
                                        <span th:if="${user.rol == 'VETERINARIO'}" class="badge bg-info text-dark rounded-3 py-1 px-2.5">VETERINARIO</span>
                                        <span th:if="${user.rol == 'CLIENTE'}" class="badge bg-success text-white rounded-3 py-1 px-2.5">CLIENTE</span>
                                    </td>
                                    <td>
                                        <span th:if="${user.enabled}" class="badge bg-success py-1 px-2">ACTIVO</span>
                                        <span th:if="${!user.enabled}" class="badge bg-secondary py-1 px-2">INACTIVO</span>
                                    </td>
                                    <td class="text-end">
                                        <div class="d-inline-flex gap-1">
                                            <!-- Editar -->
                                            <a th:href="@{/usuarios/editar/{id}(id=${user.id})}" class="btn btn-sm btn-outline-warning" title="Editar">
                                                <i class="bi bi-pencil-fill"></i>
                                            </a>
                                            <!-- Restablecer Contraseña -->
                                            <a th:href="@{/usuarios/restablecer-password/{id}(id=${user.id})}" class="btn btn-sm btn-outline-info" title="Restablecer Contraseña">
                                                <i class="bi bi-key-fill"></i>
                                            </a>
                                            <!-- Desactivar / Reactivar -->
                                            <a th:href="@{/usuarios/toggle/{id}(id=${user.id})}" 
                                               th:class="${user.enabled} ? 'btn btn-sm btn-outline-danger' : 'btn btn-sm btn-outline-success'"
                                               th:title="${user.enabled} ? 'Desactivar' : 'Activar'">
                                                <i th:class="${user.enabled} ? 'bi bi-person-x-fill' : 'bi bi-person-check-fill'"></i>
                                            </a>
                                        </div>
                                    </td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>

        </div>
    </div>

    <!-- Footer -->
    <footer th:replace="~{fragments/layout :: footer}"></footer>

    <div th:replace="~{fragments/layout :: scripts}"></div>
</body>
</html>
