# ===============================
# CONFIGURACIÓN GENERAL PRODUCCIÓN
# ===============================
spring.application.name=vetexperts-usuarios-service

# Puerto dinámico
server.port=${PORT:8081}

# ===========================
# BASE DE DATOS PRODUCCIÓN
# ===========================
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USER}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ===========================
# JPA / Hibernate
# ===========================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# ===========================
# JWT Configuration
# ===========================
jwt.secret=${JWT_SECRET:VetExpertsSecretKey2026MicroservicioUsuariosJWTTokenSeguro256bits!!}
jwt.expiration=86400000
jwt.header=Authorization
jwt.prefix=Bearer 

# ===========================
# SMTP (producción)
# ===========================
mail.host=smtp.gmail.com
mail.port=587
mail.username=${MAIL_USERNAME:tu-correo@gmail.com}
mail.password=${MAIL_PASSWORD:tu-password-app}
mail.sender=${MAIL_SENDER:tu-correo@gmail.com}
app.email.dev-mode=false

